services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: alocacao
        uid: 1000
    container_name: alocacao-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    entrypoint: ["sh", "./docker/entrypoint.sh"]
    networks:
      - alocacao
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: alocacao-nginx
    restart: unless-stopped
    ports:
      - "${DOCKER_APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - alocacao
    depends_on:
      - app

  mysql:
    image: mysql:5.7
    container_name: alocacao-mysql
    restart: unless-stopped
    ports:
      - "${DOCKER_DB_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - alocacao

  redis:
    image: redis:alpine
    container_name: alocacao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - alocacao

  # Queue worker — runs as www-data to avoid permission conflicts with Laravel storage/cache
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: alocacao
        uid: 1000
    container_name: alocacao-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    entrypoint: ["sh", "./docker/worker-entrypoint.sh"]
    networks:
      - alocacao
    depends_on:
      - mysql
      - redis

networks:
  alocacao:
    driver: bridge

volumes:
  mysql-data:
